<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Primeiro Formulário</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h2>Envie sua Sugestão ou Crítica</h2>

    <!-- O atributo 'action' define para onde os dados vão. 
         O 'method="POST"' é o padrão para enviar informações. -->
    <form action="https://formspree.io/f/seu-id" method="POST">
        
        <!-- Campo de Nome (Obrigatório) -->
        <div>
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        </div>

        <!-- Campo de E-mail (Validação automática de e-mail) -->
        <div>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
        </div>

        <!-- Menu de Seleção (Tipo de Mensagem) -->
        <div>
            <label for="assunto">Assunto:</label>
            <select id="assunto" name="assunto">
                <option value="duvida">Dúvida</option>
                <option value="sugestao" selected>Sugestão</option>
                <option value="critica">Crítica</option>
            </select>
        </div>

        <!-- Campo de Mensagem (Textarea para textos longos) -->
        <div>
            <label for="mensagem">Sua Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
        </div>

        <!-- Botão de Envio -->
        <button type="submit">Enviar Formulário</button>

    </form>

</body>
</html>
